name: Production Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Static Assets
        run: npm run verify:assets

      - name: Type Check
        run: npm run check

      - name: Build Web
        run: npm run build

      - name: Build Capacitor Web
        run: npm run build:capacitor
